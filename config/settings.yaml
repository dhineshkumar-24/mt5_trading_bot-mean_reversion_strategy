project:
  name: "Advanced Mean Reversion Bot"
  version: "1.0.0"
  magic_number: 123456

trading:
  symbol: "EURUSD"
  timeframe: "M1" # 1 Minute
  risk_per_trade: 0.01 # 1%
  max_daily_drawdown_pct: 0.02 # 3%
  max_total_drawdown_pct: 0.10 # 10%
  risk_reward_ratio: 2.0
  leverage: 100

strategy:
  z_score_trigger: 2.5
  z_score_exit: 0.0 # Mean reversion target
  volatility_lookback: 20
  vwap_window: 21
  entry_zone_target: 1.8 # Retracement level
  hurst_threshold: 0.45
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30

sessions:
  asian_start: "03:00"
  asian_end: "09:00"
  london_mid_start: "13:30"
  london_mid_end: "15:00"


filters:
  max_spread_pips: 2.0
  min_volatility_percentile: 0.2
  max_volatility_percentile: 0.8
